    <!-- Basic HTML structure below-->
    <!-- Thiss tells the browser that this is an HTML5 document-->
 <!DOCTYPE html>
    <!-- lang - declaring language in HTML: "EN", "RU" -->
 <html lang="en" />
    <!-- Head - element is a container for metadata (data about data) 
    and is placed between the <html> tag and the <body> tag. -->
 <head>
        <!-- charset - defines the character encoding: "UTF-8" -->
    <meta charset="UTF-8" />
        <!-- name / content -  -->
    <meta name="viewport" content=""width=device-width, initial-scale=1.0" />
        <!-- link - link the style.css file for styling website -->
    <link rel="stylesheet" href="styles.css" />
        <!-- title - this is text that appears in the browser tab when you open website -->]
    <title> Last name - Portfolio </title>
        <!-- Basic HTML structure end-->

    <body>
        <!-- Content will go here-->
    </body>

 </head>
