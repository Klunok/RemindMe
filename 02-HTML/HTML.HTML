<!-- This Comments -->
<!-- Basic HTML structure below-->
<!-- Thiss tells the browser that this is an HTML5 document-->
<!DOCTYPE html>
<!-- lang - declaring language in HTML: "EN", "RU" -->
<html lang="en">

<!-- Head - element is a container for metadata (data about data) 
    and is placed between the <html> tag and the <body> tag. -->

<head>
    <!-- charset - defines the character encoding: "UTF-8" -->
    <meta charset="UTF-8" />
    <!-- name / content -  -->
    <meta name="viewport" content="short descriptiob about website" width=device-width initial-scale=1.0 />
    <!-- link - link the style.css file for styling website -->
    <link rel="stylesheet" href="styles.css" />
    <!-- title - this is text that appears in the browser tab when you open website -->]
    <title> Last name - Portfolio </title>
    <!-- Basic HTML structure end-->
</head>

<!-- The visible part of the HTML document is here-->

<body>
    <!-- Content start here-->
    <h1> First Heading</h1>
    <h7> Seventh Heading</h7>
    <p> This is a paragraph. </p>
    <a href="www.google.com"> This is a link </a>
    <img scr="Picture.jpg" alt="altlink.com" width="100" height="100">
    <!-- Dot list -->
    <ul>
        <li>Dot list</li>
        <li>Dot list</li>
    </ul>
    <!-- Numbering list -->
    <ol>
        <li>Numbering list 1</li>
        <li>Numbering list 2</li>
    </ol>
</body>
<!-- All have begining and enging with "/" -->

</html>
